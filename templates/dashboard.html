<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Smart Bank - Dashboard</title>
</head>
<body>
    <div class="card">
        <nav>
            <a href="/dashboard">Dashboard</a> | 
            <a href="/investments">AI Investments</a> | 
            <a href="/logout">Logout</a>
        </nav>
        <hr>
        <h2>Welcome, {{ session['username'] }}!</h2>
        <h3>Current Balance: <span style="color: #28a745;">${{ balance }}</span></h3>
        
        <!-- Transaction Processing Module -->
        <form method="POST" style="margin-bottom: 30px;">
            <input type="number" step="0.01" name="amount" placeholder="Enter Amount ($)" required>
            <button type="submit" name="action" value="deposit" style="background:#28a745;">Deposit</button>
            <button type="submit" name="action" value="withdraw" style="background:#dc3545;">Withdraw</button>
        </form>

        <!-- View Statements Feature -->
        <h3>Recent Transactions Account Statement</h3>
        <table>
            <tr>
                <th>Type</th>
                <th>Amount</th>
                <th>Date/Time</th>
            </tr>
            {% for row in statements %}
            <tr>
                <td><strong>{{ row.type }}</strong></td>
                <td>${{ row.amount }}</td>
                <td>{{ row.timestamp }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>
</body>
</html>
