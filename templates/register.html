<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Smart Bank - Create Account</title>
</head>
<body>
    <div class="card">
        <h2>Create Your Smart Bank Account</h2>
        <p>Fill out the registration details below to open a secure checking profile.</p>
        
        <form action="/register" method="POST">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Choose a unique username" required>
            
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="name@example.com" required>
            
            <label for="password">Security Password</label>
            <input type="password" id="password" name="password" placeholder="Create a strong password" required>
            
            <button type="submit" style="background: #28a745; width: 100%; margin-top: 10px;">
                Register Account
            </button>
        </form>
        
        <hr style="margin-top: 20px; border: 0; border-top: 1px solid #ddd;">
        <p style="text-align: center;">Already have an account? <a href="/login">Log in here</a></p>
    </div>
</body>
</html>
